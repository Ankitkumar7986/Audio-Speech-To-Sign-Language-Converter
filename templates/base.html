{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --bg-color: #0f0f13;
            --panel-bg: rgba(30, 30, 35, 0.7);
            --primary-color: #7928ca;
            --primary-gradient: linear-gradient(135deg, #FF0080 0%, #7928ca 100%);
            --text-primary: #ffffff;
            --text-secondary: #a0a0ab;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-purple: #3f396b;
            --accent-purple-border: #564c91;
            --chip-bg: rgba(121, 40, 202, 0.2);
            --chip-text: #e6b3ff;
            --glass-blur: blur(16px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            background-color: rgba(15, 15, 19, 0.8);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
        }

        .navbar-brand .logo-icon {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            padding-bottom: 5px;
            transition: color 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-primary);
            border-bottom: 2px solid var(--primary-color);
        }

        .nav-logout {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }
        
        .nav-logout:hover {
            color: var(--text-primary);
        }

        /* Main Container */
        .wrapper {
            flex: 1;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Utility classes */
        .card {
            background-color: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 16px;
            padding: 2.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(121, 40, 202, 0.15);
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 128, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(121, 40, 202, 0.5);
            transform: scale(1.02);
        }
        
        /* Auth forms style overrides */
        .form-style {
            background-color: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 16px;
            padding: 3rem;
            max-width: 450px;
            margin: 4rem auto;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .form-style h1 {
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }
        .form-style input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
        }
        .form-style input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .form-style a {
            color: var(--primary-color);
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 1rem;
        }
        .form-style button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .form-style button:hover {
            background-color: #4b4ebd;
        }
        .errorlist {
            color: #ff5555;
            list-style: none;
            margin-bottom: 1rem;
        }
        .site-form label {
           color: var(--text-secondary);
           display: block;
           margin-bottom: 5px;
        }
    </style>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Audio2Sign</title>
</head>
<body>

    <nav class="navbar">
        <a href="{% url 'home' %}" class="navbar-brand">
            <i class="fa-solid fa-hands-asl-interpreting logo-icon"></i> Audio2Sign
        </a>
        
        <ul class="nav-links">
            <li><a href="{% url 'home' %}" class="{% if request.path == '/' %}active{% endif %}">Home</a></li>
            <li><a href="{% url 'animation' %}" class="{% if '/animation' in request.path %}active{% endif %}">Convertor</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
            {% if not user.is_authenticated %}
            <li><a href="{% url 'signup' %}">Sign Up</a></li>
            {% endif %}
        </ul>

        {% if user.is_authenticated %}
        <a href="{% url 'logout' %}" class="nav-logout">
            Log-Out <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </a>
        {% else %}
        <a href="{% url 'login' %}" class="nav-logout">
            Log-in <i class="fa-solid fa-arrow-right-to-bracket"></i>
        </a>
        {% endif %}
    </nav>

    <div class="wrapper">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
