{% extends 'base.html' %}
{% load static %}


{% block content %}
<style>
    .hero-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        min-height: 70vh;
        position: relative;
    }
    
    .glow-bg {
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(121, 40, 202, 0.15) 0%, rgba(0,0,0,0) 70%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: -1;
        pointer-events: none;
    }

    h1.hero-title {
        font-size: 4rem;
        font-weight: 800;
        letter-spacing: -1px;
        margin-bottom: 1rem;
        line-height: 1.1;
    }

    .gradient-text {
        background: var(--primary-gradient);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    p.hero-subtitle {
        font-size: 1.2rem;
        color: var(--text-secondary);
        max-width: 600px;
        margin-bottom: 3rem;
        line-height: 1.6;
    }

    .video-showcase {
        margin-top: 4rem;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid var(--border-color);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        position: relative;
    }
    
    .video-showcase video {
        display: block;
        max-width: 100%;
    }
</style>

<div class="hero-container">
    <div class="glow-bg"></div>
    <h1 class="hero-title">Speech & Text to <span class="gradient-text">Sign Language</span> — Live</h1>
    <p class="hero-subtitle">Speak into your microphone or type text — watch it translate into Indian Sign Language animations instantly. Built with NLP and real-time speech recognition.</p>
    
    <a href="{% url 'animation' %}"><button class="btn-primary" style="font-size: 1.2rem; padding: 1rem 3rem;">Start Converting Now</button></a>

    <div class="video-showcase">
        <video width="600" height="auto" class="center" autoplay loop muted playsinline>
            <source src="{% static 'Hello.mp4' %}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
</div>
{% endblock %}
